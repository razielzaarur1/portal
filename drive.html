<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>דרייב קורסים - פורטל לימודים</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.error(err));
            });
        }
    </script>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>

    <style>
        body {
            font-family: 'Heebo', system-ui, -apple-system, sans-serif;
            background-color: #f8fafc;
        }
        
        /* עיצוב פס גלילה מותאם אישית */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* ====== DARK MODE ====== */
        html[data-theme="dark"] body { background-color: #0f172a !important; color: #e2e8f0; }
        html[data-theme="dark"] .bg-white { background-color: #1e293b !important; }
        html[data-theme="dark"] .bg-slate-50 { background-color: #0f172a !important; }
        html[data-theme="dark"] .bg-slate-100 { background-color: #1e293b !important; }
        html[data-theme="dark"] .bg-blue-50 { background-color: #1e3a5f !important; }
        html[data-theme="dark"] .bg-blue-100 { background-color: #1e3a5f !important; }
        html[data-theme="dark"] .bg-slate-200 { background-color: #334155 !important; }
        html[data-theme="dark"] .text-slate-800, html[data-theme="dark"] .text-slate-700 { color: #e2e8f0 !important; }
        html[data-theme="dark"] .text-slate-600 { color: #94a3b8 !important; }
        html[data-theme="dark"] .text-slate-500, html[data-theme="dark"] .text-slate-400 { color: #64748b !important; }
        html[data-theme="dark"] .border-slate-200, html[data-theme="dark"] .divide-slate-100 { border-color: #334155 !important; }
        html[data-theme="dark"] .border-b { border-color: #334155 !important; }
        html[data-theme="dark"] .shadow-sm { box-shadow: 0 1px 6px rgba(0,0,0,0.4) !important; }
        html[data-theme="dark"] .hover\:bg-blue-50:hover { background-color: #1e3a5f !important; }
        html[data-theme="dark"] .hover\:bg-slate-50:hover { background-color: #1e293b !important; }
        html[data-theme="dark"] ::-webkit-scrollbar-track { background: #1e293b; }
        html[data-theme="dark"] ::-webkit-scrollbar-thumb { background: #475569; }

        .drive-dark-toggle {
            background: none; border: 1px solid #e2e8f0; color: #475569;
            padding: 6px 10px; border-radius: 8px; cursor: pointer;
            font-size: 0.9rem; transition: 0.2s; line-height: 1;
        }
        .drive-dark-toggle:hover { background: #f1f5f9; }
        html[data-theme="dark"] .drive-dark-toggle { border-color: #475569; color: #94a3b8; }
        html[data-theme="dark"] .drive-dark-toggle:hover { background: #334155; }
    </style>
</head>
<body class="text-slate-800">
    <script>
        // Apply theme before React renders to prevent flash
        (function() {
            const t = localStorage.getItem('portal_theme') || 'light';
            document.documentElement.setAttribute('data-theme', t);
        })();
        function toggleDarkMode() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const t = isDark ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', t);
            localStorage.setItem('portal_theme', t);
            document.querySelectorAll('.drive-dark-toggle').forEach(b => b.textContent = t === 'dark' ? '☀️' : '🌙');
        }
    </script>
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const IconBase = ({ children, size = 24, className = "" }) => (
          <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
            {children}
          </svg>
        );

        const Folder = (props) => <IconBase {...props}><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></IconBase>;
        const File = (props) => <IconBase {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></IconBase>;
        const Download = (props) => <IconBase {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></IconBase>;
        const AlertCircle = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></IconBase>;
        const ChevronRight = (props) => <IconBase {...props}><path d="m9 18 6-6-6-6"/></IconBase>;
        const FileText = (props) => <IconBase {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></IconBase>;
        const ImageIcon = (props) => <IconBase {...props}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></IconBase>;
        const Loader2 = (props) => <IconBase {...props}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></IconBase>;
        const Eye = (props) => <IconBase {...props}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></IconBase>;
        const X = (props) => <IconBase {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconBase>;
        const Home = (props) => <IconBase {...props}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></IconBase>;
        const LinkIcon = (props) => <IconBase {...props}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></IconBase>;

        function App() {
          const urlParams = new URLSearchParams(window.location.search);
          const isEmbed = urlParams.get('embed') === 'true';
          const courseIdParam = urlParams.get('courseId');

          const tz = localStorage.getItem('student_tz') || '';
          const isAdminMode = sessionStorage.getItem('adminMode') === 'true';
          const [isAdmin, setIsAdmin] = React.useState(false);
          
          const [files, setFiles] = useState([]);
          const [loading, setLoading] = useState(false);
          const [error, setError] = useState('');
          const [currentPath, setCurrentPath] = useState(''); 
          const [pathHistory, setPathHistory] = useState([]); 
          const [viewingFile, setViewingFile] = useState(null); 

          
          const [chatModalOpen, setChatModalOpen] = useState(false);
          const [chatMessages, setChatMessages] = useState([]);
          const [chatInput, setChatInput] = useState('');
          const [proposeModalOpen, setProposeModalOpen] = useState(false);
          const [proposalFiles, setProposalFiles] = useState([]);
          const [proposalComments, setProposalComments] = useState('');
          const [uploadStatus, setUploadStatus] = useState(null); // 'uploading', 'scanning', 'pending', 'approved', 'rejected', 'virus'
          
          // Proposal Path creation (Virtual)
          const [virtualFolders, setVirtualFolders] = useState([]);
          
          const fetchChatHistory = async () => {
             if (!tz) return;
             try {
                const res = await fetch(`/api/chat/${tz}`);
                const data = await res.json();
                setChatMessages(data);
             } catch(e) {}
          };
          
          useEffect(() => {
             if (chatModalOpen) fetchChatHistory();
          }, [chatModalOpen]);
          
          const sendChatMessage = async () => {
             if (!chatInput.trim()) return;
             try {
                await fetch(`/api/chat/${tz}`, {
                   method: 'POST',
                   headers: {'Content-Type':'application/json'},
                   body: JSON.stringify({ message: chatInput, sender: 'student' })
                });
                setChatInput('');
                fetchChatHistory();
             } catch(e) {
                alert('שגיאה בשליחה או שהצ\'אט נחסם עבורך');
             }
          };
          
          const handleProposeUpload = async () => {
             if (proposalFiles.length === 0) return alert('נא לבחור לפחות קובץ אחד');
             if (proposalFiles.length > 20) return alert('ניתן לבחור עד 20 קבצים');
             
             const formData = new FormData();
             formData.append('tz', tz);
             formData.append('proposed_path', currentPath);
             formData.append('comments', proposalComments);
             if (sharedFilesToken) {
                 formData.append('shareToken', sharedFilesToken);
             } else {
                 Array.from(proposalFiles).forEach(file => {
                     formData.append('files', file);
                 });
             }
             
             try {
                 setLoading(true);
                 const res = await fetch('/api/drive/propose-file', {
                     method: 'POST',
                     body: formData
                 });
                 const data = await res.json();
                 
                 if (!res.ok) throw new Error(data.message || 'שגיאה בהעלאה');
                 
                 alert(data.warning === 'virus' ? 'הקובץ שלך הוכנס להסגר לבדיקת וירוסים. המנהל יעדכן אותך' : 'הצעתך נשלחה למנהל בהצלחה!');
                 setProposeModalOpen(false);
                 setProposalFiles([]);
                 setProposalComments('');
                 setSharedFilesToken(null);
             } catch (e) {
                 alert(e.message);
             } finally {
                 setLoading(false);
             }
          };
          
          const createVirtualFolder = async () => {
              const name = prompt('הכנס שם תיקייה להוספה (זמני עד אישור):');
              if (!name) return;
              
              try {
                  const res = await fetch('/api/drive/propose-folder', {
                      method: 'POST',
                      headers: {'Content-Type': 'application/json'},
                      body: JSON.stringify({ tz, path: currentPath === '/' ? `/${name}` : `${currentPath}/${name}` })
                  });
                  const data = await res.json().catch(()=>({}));
                  if (!res.ok) {
                      return alert(data.message || 'שגיאה ביצירת תיקייה');
                  }
                  
                  // Add to virtual UI
                  setVirtualFolders([...virtualFolders, { name, path: currentPath, isDirectory: true, isVirtual: true }]);
              } catch(e) {}
          };

const [previewLoading, setPreviewLoading] = useState(false);
          const [blobUrl, setBlobUrl] = useState(null);
          
          // Admin specific state - auto-enter edit mode if coming from admin panel
          const [editMode, setEditMode] = useState(isAdminMode);
          const [allUsers, setAllUsers] = useState([]);
          const [permModal, setPermModal] = useState({ open: false, item: null, visibility: 'inherit', users: [] });
          const [courseLinkModal, setCourseLinkModal] = useState({ open: false, path: null });
          const [coursesList, setCoursesList] = useState([]);
          const [passwordModal, setPasswordModal] = useState({ open: false, inputVal: '', error: '' });
          const [sharedFilesToken, setSharedFilesToken] = useState(null);
          const [favorites, setFavorites] = useState(new Set());
          const [userRatings, setUserRatings] = useState({});
          const [avgRatings, setAvgRatings] = useState({});
          const [showOnlyFavorites, setShowOnlyFavorites] = useState(false);
          const [searchQuery, setSearchQuery] = useState('');
          const [searchResults, setSearchResults] = useState(null);
          const [isSearching, setIsSearching] = useState(false);
          // Handle PWA Share Target
          useEffect(() => {
              const urlParams = new URLSearchParams(window.location.search);
              const st = urlParams.get('shareToken');
              if (st) {
                  setSharedFilesToken(st);
                  setProposeModalOpen(true);
                  fetch('/api/shared-files/' + st).then(r=>r.json()).then(data => {
                      if (data.files) {
                          setProposalFiles(data.files.map(f => ({ name: f.originalname, size: f.size, isShared: true })));
                      }
                  });
                  window.history.replaceState({}, document.title, window.location.pathname);
              }
          }, []);

          // Check maintenance
          useEffect(() => {
              fetch(`/api/maintenance/status?tz=${tz || ''}`)
                  .then(r => r.json())
                  .then(data => {
                      if (data.enabled && !data.isAdmin) window.location.href = 'maintenance.html';
                  })
                  .catch(() => {});
          }, [tz]);

          // Check admin status from server
          useEffect(() => {
            if (tz) {
              fetch(`/api/auth/is-admin/${tz}`)
                .then(r => r.json())
                .then(data => setIsAdmin(data.isAdmin))
                .catch(() => {});
            }
          }, [tz]);

          // Fetch users on load if admin
          useEffect(() => {
            if (isAdmin) {
              fetch('/api/users').then(r => r.json()).then(setAllUsers).catch(console.error);
            }
          }, [isAdmin]);

          // Fetch and sort courses on load
          useEffect(() => {
            fetch('/api/courses?t=' + new Date().getTime())
               .then(res => res.json())
               .then(data => {
                   const sorted = [...data].sort((a, b) => {
                       if (a.year !== b.year) return a.year - b.year;
                       return a.semester.localeCompare(b.semester);
                   });
                   setCoursesList(sorted);
               })
               .catch(console.error);
          }, []);

          // Fetch Favorites and Ratings
          const loadFavsAndRatings = useCallback(async () => {
              if(!tz) return;
              try {
                  const [fRes, urRes, arRes] = await Promise.all([
                      fetch(`/api/favorites/${tz}`),
                      fetch(`/api/ratings/${tz}`),
                      fetch(`/api/ratings`)
                  ]);
                  if(fRes.ok) {
                      const fData = await fRes.json();
                      setFavorites(new Set(fData.map(f => f.path)));
                  }
                  if(urRes.ok) {
                      const urData = await urRes.json();
                      setUserRatings(urData);
                  }
                  if(arRes.ok) {
                      const arData = await arRes.json();
                      setAvgRatings(arData);
                  }
              } catch(e) {}
          }, [tz]);

          useEffect(() => { loadFavsAndRatings(); }, [loadFavsAndRatings]);

          const toggleFavorite = async (e, path, isFolder) => {
              e.stopPropagation();
              const action = favorites.has(path) ? 'remove' : 'add';
              try {
                  const res = await fetch(`/api/favorites/${tz}`, {
                      method: 'POST', headers: {'Content-Type': 'application/json'},
                      body: JSON.stringify({ path, isFolder, action })
                  });
                  if(res.ok) {
                      const newFavs = new Set(favorites);
                      if(action==='add') newFavs.add(path); else newFavs.delete(path);
                      setFavorites(newFavs);
                  }
              } catch(e) {}
          };

          const setRating = async (e, path, rating) => {
              e.stopPropagation();
              try {
                  const res = await fetch(`/api/ratings/${tz}`, {
                      method: 'POST', headers: {'Content-Type': 'application/json'},
                      body: JSON.stringify({ path, rating })
                  });
                  if(res.ok) {
                      loadFavsAndRatings();
                  }
              } catch(e) {}
          };

          const executeSearch = async (e) => {
              if (e) e.preventDefault();
              if (!searchQuery.trim() || searchQuery.trim().length < 2) {
                  setSearchResults(null);
                  return;
              }
              setIsSearching(true);
              try {
                  const res = await fetch(`/api/drive/search?q=${encodeURIComponent(searchQuery)}`);
                  const data = await res.json();
                  setSearchResults(data.results || []);
              } catch(err) {
                  alert("שגיאה בחיפוש");
              } finally {
                  setIsSearching(false);
              }
          };

          const fetchLocalFiles = useCallback(async (pathToFetch = "/", showLoading = true) => {
            if (showLoading) {
                setLoading(true);
                setError('');
            }

            try {
              let actualPath = pathToFetch;
              if (courseIdParam && pathToFetch === "/") {
                  const linkRes = await fetch(`/api/courses/link/${courseIdParam}`);
                  const linkData = await linkRes.json();
                  if (linkData.folderPath) {
                      actualPath = linkData.folderPath;
                  } else {
                      throw new Error('לא הוגדרה תיקייה לקורס זה.');
                  }
              }

              const response = await fetch(`/api/drive/list?path=${encodeURIComponent(actualPath)}&tz=${tz}&editMode=${editMode}`);
              const data = await response.json();
              
              setCurrentPath(actualPath === "/" ? "" : actualPath);

              if (!response.ok) {
                if(data.error === 'Not found' || response.status === 404) {
                    setFiles([]);
                    return;
                }
                throw new Error(data.error || 'שגיאה בטעינת קבצים מהשרת המקומי');
              }

              setFiles(data.files || []);
            } catch (err) {
              setError(err.message);
              if (err.message && err.message.includes('Access denied')) {
                 setFiles([]);
              }
            } finally {
              if (showLoading) setLoading(false);
            }
          }, [tz, editMode, courseIdParam]);

          const currentPathRef = useRef(currentPath);
          useEffect(() => { currentPathRef.current = currentPath; }, [currentPath]);

          useEffect(() => {
            fetch('/api/track', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ tz: tz, path: 'drive:' + (currentPath || '/') })
            }).catch(e => console.error(e));
          }, [currentPath, tz]);

          useEffect(() => {
            fetchLocalFiles(currentPath || "/", true);
            
            if (!tz) return;
            const eventSource = new EventSource(`/api/events/${tz}`);
            eventSource.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    if (data.type === 'file_approved') {
                        fetchLocalFiles(currentPathRef.current || "/", false);
                    }
                } catch(err) {}
            };
            
            return () => {
                eventSource.close();
            };
          }, [fetchLocalFiles, tz]);

          const handleFolderClick = (folderData) => {
            setPathHistory([...pathHistory, currentPath]);
            const newPath = currentPath === "" 
                ? `/${folderData.name}` 
                : `${currentPath}/${folderData.name}`;
            fetchLocalFiles(newPath);
          };

          const handleBackClick = () => {
            const previousPath = pathHistory[pathHistory.length - 1];
            const newHistory = pathHistory.slice(0, -1);
            setPathHistory(newHistory);
            fetchLocalFiles(previousPath || "/");
          };

          const getFileIcon = (filename) => {
            const ext = filename.split('.').pop().toLowerCase();
            if (['jpg', 'png', 'gif', 'jpeg'].includes(ext)) return <ImageIcon className="text-purple-500" size={24} />;
            if (['pdf'].includes(ext)) return <FileText className="text-red-500" size={24} />;
            return <File className="text-slate-400" size={24} />;
          };

          const getDownloadUrl = (file) => {
            const basePath = currentPath === "" ? "" : currentPath;
            return `/studies${basePath}/${file.name}?tz=${tz}`;
          };

          const getRawFileUrl = (file) => {
            return getDownloadUrl(file);
          };

          useEffect(() => {
            let currentBlobUrl = null;

            const loadFileIntoMemory = async () => {
              if (!viewingFile) return;
              
              const ext = viewingFile.name.split('.').pop().toLowerCase();
              
              if (ext === 'pdf') {
                setPreviewLoading(true);
                try {
                  const response = await fetch(getDownloadUrl(viewingFile));
                  if (!response.ok) throw new Error('שגיאה בטעינת הקובץ מהשרת');
                  
                  const blob = await response.blob();
                  const pdfBlob = new Blob([blob], { type: 'application/pdf' });
                  currentBlobUrl = URL.createObjectURL(pdfBlob); 
                  
                  setBlobUrl(currentBlobUrl);
                } catch (err) {
                  console.error("שגיאה בטעינת הקובץ:", err);
                } finally {
                  setPreviewLoading(false);
                }
              } else {
                setBlobUrl(null);
              }
            };

            loadFileIntoMemory();

            return () => {
              if (currentBlobUrl) {
                URL.revokeObjectURL(currentBlobUrl);
              }
            };
          }, [viewingFile, currentPath]);

          const handleCloseFile = () => {
            if (blobUrl) {
              URL.revokeObjectURL(blobUrl); 
            }
            setViewingFile(null);
            setBlobUrl(null);
            setPreviewLoading(false);
          };

          const openPermModal = (e, item) => {
            e.stopPropagation();
            setPermModal({
               open: true,
               item: item,
               visibility: item.permission ? item.permission.visibility : 'inherit',
               users: item.permission ? item.permission.users : []
            });
          };

          const savePermissions = async () => {
             try {
                await fetch('/api/drive/permissions', {
                   method: 'POST',
                   headers: { 'Content-Type': 'application/json' },
                   body: JSON.stringify({
                      path: permModal.item.path,
                      visibility: permModal.visibility,
                      users: permModal.users
                   })
                });
                setPermModal({ open: false, item: null, visibility: 'inherit', users: [] });
                fetchLocalFiles(currentPath || "/");
             } catch(e) {
                alert("שגיאה בשמירת הרשאות");
             }
          };

          const toggleUserSelection = (userId) => {
             const newUsers = permModal.users.includes(userId) 
                ? permModal.users.filter(id => id !== userId)
                : [...permModal.users, userId];
             setPermModal({ ...permModal, users: newUsers });
          };

          const triggerCacheRefresh = async () => {
             try {
                await fetch('/api/drive/refresh', { method: 'POST' });
                alert("רענון מטמון נשלח לשרת. זה עשוי לקחת כמה רגעים.");
             } catch(e) {
                alert("שגיאה ברענון");
             }
          };

          const handleDownloadFolderAsZip = () => {
             const tz = localStorage.getItem('student_tz') || '';
             const url = `/api/drive/download-zip?path=${encodeURIComponent(currentPath)}&tz=${tz}`;
             window.open(url, '_blank');
          };

          const submitEditPassword = async () => {
             try {
                const res = await fetch('/api/auth/edit-password', {
                   method: 'POST',
                   headers: { 'Content-Type': 'application/json' },
                   body: JSON.stringify({ password: passwordModal.inputVal })
                });
                if (res.ok) {
                   setEditMode(true);
                   setPasswordModal({ open: false, inputVal: '', error: '' });
                } else {

                            <a 
                              href={getDownloadUrl(viewingFile)} 
                              target="_blank" 
                              rel="noopener noreferrer"
                              className="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl transition-all shadow-sm font-medium flex items-center gap-2"
                            >
                              <Download size={20} />
                              הורדה
                            </a>
                          </div>
                        );
                      }
                    })()}
                  </div>
                </div>
              )}

              
              {/* Chat Modal */}
              {chatModalOpen && (
                 <div className="fixed inset-0 bg-slate-900/50 z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl w-full max-w-md shadow-xl flex flex-col h-[60vh] overflow-hidden">
                       <div className="bg-blue-600 text-white p-4 flex justify-between items-center">
                          <h2 className="text-lg font-bold">הצעות והערות (למנהל)</h2>
                          <button onClick={() => setChatModalOpen(false)} className="hover:text-blue-200">
                             <X size={20} />
                          </button>
                       </div>
                       <div className="flex-1 bg-slate-50 p-4 overflow-y-auto flex flex-col gap-3">
                           {chatMessages.map(msg => (
                               <div key={msg.id} className={`p-3 rounded-lg max-w-[80%] ${msg.sender === 'student' ? 'bg-blue-100 self-start' : 'bg-slate-200 self-end'}`}>
                                   <div className="text-sm">{msg.message}</div>
                                   <div className="text-[10px] text-slate-500 mt-1">{new Date(msg.timestamp).toLocaleString()}</div>
                               </div>
                           ))}
                           {chatMessages.length === 0 && <div className="text-center text-slate-400 mt-10">אין הודעות. שלח הודעה למנהל.</div>}
                       </div>
                       <div className="p-3 bg-white border-t border-slate-200 flex gap-2">
                           <input 
                               type="text" 
                               value={chatInput}
                               onChange={e => setChatInput(e.target.value)}
                               onKeyDown={e => e.key === 'Enter' && sendChatMessage()}
                               placeholder="הקלד הודעה..." 
                               className="flex-1 border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500"
                           />
                           <button onClick={sendChatMessage} className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold">שלח</button>
                       </div>
                    </div>
                 </div>
              )}

              {/* Propose Files Modal */}
              {proposeModalOpen && (
                 <div className="fixed inset-0 bg-slate-900/50 z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl p-6 w-full max-w-md shadow-xl flex flex-col max-h-[90vh]">
                       <div className="flex justify-between items-center mb-4">
                          <h2 className="text-xl font-bold text-slate-800">הוספת קבצים / ZIP</h2>
                          <button onClick={() => setProposeModalOpen(false)} className="p-1 text-slate-400">
                             <X size={20} />
                          </button>
                       </div>
                       <p className="text-sm text-slate-500 mb-4">
                           הקבצים יישלחו לאישור המנהל (נתיב: <span dir="ltr">{currentPath || '/'}</span>).
                           ניתן להעלות קובצי ZIP, והמנהל יפתח אותם אוטומטית. עד 20 קבצים.
                       </p>
                       <input 
                           type="file" 
                           multiple
                           onChange={e => setProposalFiles(e.target.files)}
                           className="mb-4 block w-full text-sm text-slate-500
                                      file:mr-4 file:py-2 file:px-4
                                      file:rounded-full file:border-0
                                      file:text-sm file:font-semibold
                                      file:bg-blue-50 file:text-blue-700
                                      hover:file:bg-blue-100"
                       />
                       <textarea 
                           placeholder="הערות למנהל (אופציונלי)..." 
                           value={proposalComments}
                           onChange={e => setProposalComments(e.target.value)}
                           className="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm mb-4 min-h-[80px]"
                       />
                       <button onClick={handleProposeUpload} disabled={loading} className="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-2.5 rounded-xl transition-colors disabled:opacity-50">
                           {loading ? 'מעלה...' : 'שלח לאישור'}
                       </button>
                    </div>
                 </div>
              )}

{/* Permissions Modal */}
              {permModal.open && (
                 <div className="fixed inset-0 bg-slate-900/50 z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl p-6 w-full max-w-md shadow-xl flex flex-col max-h-[90vh]">
                       <div className="flex justify-between items-center mb-4">
                          <h2 className="text-xl font-bold text-slate-800">הגדרות הרשאה</h2>
                          <button onClick={() => setPermModal({...permModal, open: false})} className="p-1 text-slate-400 hover:text-slate-600">
                             <X size={20} />
                          </button>
                       </div>
                       
                       <p className="text-sm text-slate-500 mb-4 break-all whitespace-normal" dir="ltr">{permModal.item.path}</p>
                       
                       <div className="space-y-3 mb-6">
                          <label className="flex items-center gap-3 cursor-pointer">
                             <input type="radio" name="visibility" value="inherit" 
                                checked={permModal.visibility === 'inherit'} 
                                onChange={(e) => setPermModal({...permModal, visibility: e.target.value, users: []})} 
                                className="w-4 h-4 text-blue-600"
                             />
                             <span className="text-slate-700 font-medium">ברירת מחדל (ירושה)</span>
                          </label>
                          <label className="flex items-center gap-3 cursor-pointer">
                             <input type="radio" name="visibility" value="everyone" 
                                checked={permModal.visibility === 'everyone'} 
                                onChange={(e) => setPermModal({...permModal, visibility: e.target.value, users: []})} 
                                className="w-4 h-4 text-blue-600"
                             />
                             <span className="text-slate-700 font-medium">כולם (פומבי)</span>
                          </label>
                          <label className="flex items-center gap-3 cursor-pointer">
                             <input type="radio" name="visibility" value="none" 
                                checked={permModal.visibility === 'none'} 
                                onChange={(e) => setPermModal({...permModal, visibility: e.target.value, users: []})} 
                                className="w-4 h-4 text-blue-600"
                             />
                             <span className="text-slate-700 font-medium">אף אחד (נסתר לחלוטין)</span>
                          </label>
                          <label className="flex items-center gap-3 cursor-pointer">
                             <input type="radio" name="visibility" value="except" 
                                checked={permModal.visibility === 'except'} 
                                onChange={(e) => setPermModal({...permModal, visibility: e.target.value})} 
                                className="w-4 h-4 text-blue-600"
                             />
                             <span className="text-slate-700 font-medium">כולם חוץ מ...</span>
                          </label>
                          <label className="flex items-center gap-3 cursor-pointer">
                             <input type="radio" name="visibility" value="only" 
                                checked={permModal.visibility === 'only'} 
                                onChange={(e) => setPermModal({...permModal, visibility: e.target.value})} 
                                className="w-4 h-4 text-blue-600"
                             />
                             <span className="text-slate-700 font-medium">אף אחד, פרט ל... (רק מ...)</span>
                          </label>
                       </div>

                       {(permModal.visibility === 'except' || permModal.visibility === 'only') && (
                          <div className="flex-1 overflow-y-auto border border-slate-200 rounded-lg p-3 mb-4 space-y-2">
                             {allUsers.length === 0 ? <p className="text-sm text-slate-400 text-center py-4">אין משתמשים במערכת</p> : 
                              allUsers.map(u => (
                                <label key={u.tz} className="flex items-center gap-3 p-2 hover:bg-slate-50 rounded-md cursor-pointer">
                                   <input type="checkbox" 
                                      checked={permModal.users.includes(u.tz)}
                                      onChange={() => toggleUserSelection(u.tz)}
                                      className="w-4 h-4 rounded text-blue-600"
                                   />
                                   <div>
                                      <span className="block text-sm font-medium text-slate-700">{u.name || 'ללא שם'}</span>
                                      <span className="block text-xs text-slate-400">{u.tz}</span>
                                   </div>
                                </label>
                              ))
                             }
                          </div>
                       )}

                       <div className="mt-auto pt-4 border-t border-slate-100 flex gap-3">
                          <button onClick={savePermissions} className="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-xl transition-colors">
                             שמור הגדרות
                          </button>
                       </div>
                    </div>
                 </div>
              )}

              {/* Course Link Modal */}
              {courseLinkModal.open && (
                 <div className="fixed inset-0 bg-slate-900/50 z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl p-6 w-full max-w-md shadow-xl flex flex-col max-h-[90vh]">
                       <div className="flex justify-between items-center mb-4">
                          <h2 className="text-xl font-bold text-slate-800">שיוך תיקייה לקורס</h2>
                          <button onClick={() => setCourseLinkModal({open: false, path: null})} className="p-1 text-slate-400 hover:text-slate-600">
                             <X size={20} />
                          </button>
                       </div>
                       <p className="text-sm text-slate-500 mb-4 break-all whitespace-normal" dir="ltr">{courseLinkModal.path}</p>
                       <div className="flex-1 overflow-y-auto border border-slate-200 rounded-lg p-3 space-y-2 mb-4">
                           {coursesList.map(c => (
                               <button 
                                  key={c.id} 
                                  onClick={() => saveCourseLink(c.id)}
                                  className="w-full text-right p-3 hover:bg-blue-50 rounded-lg border border-transparent hover:border-blue-100 transition-colors"
                               >
                                  <div className="font-bold text-slate-700">{c.name}</div>
                                  <div className="text-xs text-slate-400">שנה {c.year} | סמסטר {c.semester === 'A' ? "א'" : "ב'"}</div>
                               </button>
                           ))}
                       </div>
                    </div>
                 </div>
              )}

              {/* Password Modal */}
              {passwordModal.open && (
                 <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl">
                       <div className="flex justify-between items-center mb-4">
                          <h2 className="text-xl font-bold text-slate-800">כניסה למצב עריכה</h2>
                          <button onClick={() => setPasswordModal({ open: false, inputVal: '', error: '' })} className="p-1 text-slate-400 hover:text-slate-600">
                             <X size={20} />
                          </button>
                       </div>
                       <p className="text-sm text-slate-500 mb-4">הזן את סיסמת הניהול כדי לעבור למצב עריכת הרשאות</p>
                       <input
                          type="password"
                          value={passwordModal.inputVal}
                          onChange={e => setPasswordModal(p => ({ ...p, inputVal: e.target.value, error: '' }))}
                          onKeyDown={async e => { if (e.key === 'Enter') await submitEditPassword(); }}
                          placeholder="סיסמה..."
                          autoFocus
                          className="w-full border border-slate-200 rounded-xl px-4 py-2.5 text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                       />
                       {passwordModal.error && (
                          <p className="text-red-500 text-sm mb-3">{passwordModal.error}</p>
                       )}
                       <button
                          onClick={submitEditPassword}
                          className="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-xl transition-colors"
                       >
                          כניסה
                       </button>
                    </div>
                 </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
