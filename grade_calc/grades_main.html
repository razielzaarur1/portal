<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחשבון ציונים - בחירת פעולה</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Rubik', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 40px; margin-top: 20px; }
        .header h1 { font-size: 2rem; color: #1e40af; margin-bottom: 5px; }
        .back-btn { align-self: flex-start; text-decoration: none; color: #64748b; font-weight: 500; display: flex; align-items: center; gap: 8px; margin-bottom: 20px; background: white; padding: 8px 15px; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .options-container { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 400px; }
        .option-btn { display: flex; align-items: center; padding: 20px; border-radius: 16px; text-decoration: none; transition: 0.2s; border: 1px solid #e2e8f0; background: #ffffff; color: #1e293b; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .option-btn:active { transform: scale(0.98); }
        .opt-icon { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-left: 20px; flex-shrink: 0; background: #e2e8f0; color: #475569; }
        .opt-text h4 { margin: 0; font-size: 1.2rem; }
        .opt-text p { margin: 5px 0 0; font-size: 0.9rem; opacity: 0.8; }
    </style>
</head>
<body>
    <a href="../index.html" class="back-btn"><i class="fas fa-arrow-right"></i> חזרה לראשי</a>
    <div class="header">
        <h1>מחשבון ציונים מתקדם</h1>
    </div>
    <div class="options-container">
        <a href="grades_calc.html" class="option-btn">
            <div class="opt-text" style="flex:1">
                <h4>כניסה למערכת</h4>
                <p>מעבר למערכת חישוב ציונים וגרפים</p>
            </div>
            <div class="opt-icon"><i class="fas fa-calculator"></i></div>
        </a>
    </div>
</body>
</html>
