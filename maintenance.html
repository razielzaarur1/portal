<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תחזוקה - פורטל לימודים</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Rubik", sans-serif; }
        body { min-height: 100vh; background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%); display: flex; align-items: center; justify-content: center; color: white; overflow: hidden; }
        .particles { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
        .particle { position: absolute; border-radius: 50%; background: rgba(96, 165, 250, 0.15); animation: float linear infinite; }
        @keyframes float { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-100px) scale(1); opacity: 0; } }
        .container { text-align: center; padding: 40px 24px; max-width: 520px; width: 100%; position: relative; z-index: 10; }
        .icon-ring { width: 120px; height: 120px; border-radius: 50%; background: rgba(59, 130, 246, 0.2); border: 2px solid rgba(96, 165, 250, 0.4); display: flex; align-items: center; justify-content: center; margin: 0 auto 32px; font-size: 3.5rem; animation: pulse-ring 2s ease-in-out infinite; position: relative; }
        .icon-ring::after { content: ""; position: absolute; inset: -12px; border-radius: 50%; border: 1px solid rgba(96, 165, 250, 0.2); animation: pulse-ring 2s ease-in-out infinite 0.5s; }
        @keyframes pulse-ring { 0%, 100% { box-shadow: 0 0 0 0 rgba(96, 165, 250, 0.2); } 50% { box-shadow: 0 0 0 20px rgba(96, 165, 250, 0); } }
        h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 12px; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { font-size: 1rem; color: rgba(255,255,255,0.6); margin-bottom: 36px; line-height: 1.7; }
        .status-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 28px; backdrop-filter: blur(10px); margin-bottom: 24px; }
        .status-row { display: flex; align-items: center; gap: 14px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.06); text-align: right; }
        .status-row:last-child { border-bottom: none; padding-bottom: 0; }
        .status-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
        .status-icon.blue { background: rgba(59, 130, 246, 0.2); }
        .status-icon.purple { background: rgba(167, 139, 250, 0.2); }
        .status-icon.green { background: rgba(16, 185, 129, 0.2); }
        .status-text { flex: 1; }
        .status-text strong { display: block; font-size: 0.9rem; color: rgba(255,255,255,0.9); }
        .status-text span { font-size: 0.8rem; color: rgba(255,255,255,0.45); }
        .progress-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-top: 16px; overflow: hidden; }
        .progress-fill { height: 100%; width: 60%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); border-radius: 4px; animation: progress-pulse 2s ease-in-out infinite; }
        @keyframes progress-pulse { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }
        .footer-text { color: rgba(255,255,255,0.3); font-size: 0.8rem; margin-top: 24px; }
        .gear-spin { display: inline-block; animation: spin 3s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="container">
        <div class="icon-ring"><span class="gear-spin">⚙️</span></div>
        <h1>האתר בתחזוקה</h1>
        <p class="subtitle">אנחנו עובדים על שיפורים עבורך.<br>נחזור בקרוב, מבטיחים! 🔧</p>
        <div class="status-card">
            <div class="status-row">
                <div class="status-icon blue"><i class="fas fa-server"></i></div>
                <div class="status-text"><strong>שרת הנתונים</strong><span>בתהליך עדכון</span></div>
            </div>
            <div class="status-row">
                <div class="status-icon purple"><i class="fas fa-code"></i></div>
                <div class="status-text"><strong>מערכת הקבצים</strong><span>בדיקות שלמות</span></div>
            </div>
            <div class="status-row">
                <div class="status-icon green"><i class="fas fa-shield-alt"></i></div>
                <div class="status-text"><strong>אבטחת המערכת</strong><span>פעיל ומוגן</span></div>
            </div>
            <div class="progress-bar"><div class="progress-fill"></div></div>
        </div>
        <p class="footer-text"><i class="fas fa-envelope-open-text"></i> פורטל לימודים — הנדסת חשמל</p>
    </div>
    <script>
        const container = document.getElementById("particles");
        for (let i = 0; i < 20; i++) {
            const p = document.createElement("div");
            p.className = "particle";
            const size = Math.random() * 60 + 10;
            p.style.cssText = "width:" + size + "px;height:" + size + "px;left:" + (Math.random()*100) + "%;animation-duration:" + (Math.random()*15+10) + "s;animation-delay:" + (Math.random()*10) + "s;";
            container.appendChild(p);
        }
    </script>
</body>
</html>
